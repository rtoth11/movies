name: 1. CI pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      extraction: ${{ steps.filter.outputs.extraction }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            extraction:
              - 'extraction/**'

  run_tests:
    needs: detect_changes
    if: needs.detect_changes.outputs.extraction == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Poetry
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        working-directory: "./extraction"
        run: |
          pip install poetry
          poetry install --no-root --with dev

      - name: Run unit tests
        working-directory: "./extraction"
        run: |
          poetry run pytest --cov=src --cov-report=term-missing
