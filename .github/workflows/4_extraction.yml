name: 4. Build and deploy extraction service

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: "./terraform/infrastructure"
        run: terraform init

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: "./terraform/infrastructure"
        run: |
          echo "extraction_ecr_repository_url=$(terraform output -raw extraction_ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "role_for_infrastructure_update=$(terraform output -raw role_for_infrastructure_update)" >> $GITHUB_OUTPUT
          echo "pg_host=$(terraform output -raw pg_host)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ steps.tf_outputs.outputs.role_for_infrastructure_update }}
          aws-region: us-east-1

      - name: Update SSM Parameters
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          PG_HOST: ${{ steps.tf_outputs.outputs.pg_host }}
          PG_DATABASE: ${{ secrets.PG_DATABASE }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          GENRES: ${{ vars.GENRES }}
          NUMBER_OF_MOVIES: ${{ vars.NUMBER_OF_MOVIES }}
        run: |
          aws ssm put-parameter \
            --name "/extraction/TMDB_API_KEY" \
            --value "$TMDB_API_KEY" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/DATABRICKS_HOST" \
            --value "$DATABRICKS_HOST" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/DATABRICKS_TOKEN" \
            --value "$DATABRICKS_TOKEN" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/PG_HOST" \
            --value "$PG_HOST" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/PG_DATABASE" \
            --value "$PG_DATABASE" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/PG_USER" \
            --value "$PG_USER" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/PG_PASSWORD" \
            --value "$PG_PASSWORD" \
            --type "SecureString" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/GENRES" \
            --value "$GENRES" \
            --type "String" \
            --overwrite

          aws ssm put-parameter \
            --name "/extraction/NUMBER_OF_MOVIES" \
            --value "$NUMBER_OF_MOVIES" \
            --type "String" \
            --overwrite

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Read version from file
        run: echo "EXTRACTION_VERSION=$(cat extraction/VERSION)" >> $GITHUB_ENV

      - name: Set image tags
        id: set_tags
        run: |
          TAGS="${{ steps.tf_outputs.outputs.extraction_ecr_repository_url }}:${EXTRACTION_VERSION}"
          TAGS="$TAGS,${{ steps.tf_outputs.outputs.extraction_ecr_repository_url }}:latest"
          echo "TAGS=$TAGS" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: ./extraction
          file: ./extraction/Dockerfile
          push: true
          tags: ${{ steps.set_tags.outputs.tags }}
          provenance: false
          build-args: |
            DATABRICKS_MOVIE_DATA_VOLUME_PATH=${{ vars.DATABRICKS_MOVIE_DATA_VOLUME_PATH }}
