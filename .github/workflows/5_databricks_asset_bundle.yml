name: 5. Deploy Databricks asset bundle

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy_asset_bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: "./terraform/infrastructure"
        run: terraform init

      - name: Read Terraform outputs
        id: tf_outputs
        working-directory: "./terraform/infrastructure"
        run: |
          echo "movies_s3_bucket_name=$(terraform output -raw movies_s3_bucket_name)" >> $GITHUB_OUTPUT
          echo "aws_region=$(terraform output -raw aws_region)" >> $GITHUB_OUTPUT
          echo "role_for_infrastructure_update=$(terraform output -raw role_for_infrastructure_update)" >> $GITHUB_OUTPUT

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Create secret scope in Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks secrets create-scope ${{ vars.DATABRICKS_SECRET_SCOPE }} || echo "Scope already exists"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set AWS keys as Databricks secrets
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SECRET_SCOPE: ${{ vars.DATABRICKS_SECRET_SCOPE }}
        run: |
          databricks secrets put-secret --json '{"scope":"'"$SECRET_SCOPE"'","key":"aws_access_key_id","string_value":"'"$AWS_ACCESS_KEY_ID"'"}'
          databricks secrets put-secret --json '{"scope":"'"$SECRET_SCOPE"'","key":"aws_secret_access_key","string_value":"'"$AWS_SECRET_ACCESS_KEY"'"}'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.tf_outputs.outputs.role_for_infrastructure_update }}
          aws-region: ${{ steps.tf_outputs.outputs.aws_region }}

      - name: Read Lambda function name from SSM
        id: read_lambda_name
        run: |
          echo "lambda_name=$(aws ssm get-parameter --name /movies/PG_IMPORT_LAMBDA_NAME --region ${{ steps.tf_outputs.outputs.aws_region }} --query "Parameter.Value" --output text)" >> $GITHUB_OUTPUT

      - name: Deploy movies asset bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          BUNDLE_VAR_movie_data_volume_path: ${{ vars.DATABRICKS_MOVIE_DATA_VOLUME_PATH }}
          BUNDLE_VAR_secret_scope: ${{ vars.DATABRICKS_SECRET_SCOPE }}
          BUNDLE_VAR_s3_bucket_name: ${{ steps.tf_outputs.outputs.movies_s3_bucket_name }}
          BUNDLE_VAR_lambda_name: ${{ steps.read_lambda_name.outputs.lambda_name }}
          BUNDLE_VAR_aws_region: ${{ steps.tf_outputs.outputs.aws_region }}
        working-directory: "./movies_asset_bundle"
        run: |
          databricks bundle deploy -t prod
