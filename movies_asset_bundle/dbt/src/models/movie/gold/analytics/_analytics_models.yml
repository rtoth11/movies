models:
  - name: dim_actors
    description: "Dimension table containing distinct actors derived from the character-actor mapping."
    columns:
      - name: tmdb_id
        description: "The TMDB identifier of the actor. The value -1 is a sentinel representing an unknown actor when no matching actor could be found for a character."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "The name of the actor."
        data_tests:
          - not_null

  - name: dim_characters
    description: "Dimension table containing characters, uniquely identified by a hash of character name, actor, and movie."
    columns:
      - name: id
        description: "Surrogate key generated from character name, actor TMDB ID, and movie TMDB ID."
        data_tests:
          - not_null
          - unique
      - name: name
        description: "The name of the character."
        data_tests:
          - not_null

  - name: dim_dates
    description: "Date dimension table covering 2026-01-01 to 2030-12-31, generated via dbt_utils date spine."
    columns:
      - name: date
        description: "The calendar date."
        data_tests:
          - not_null
          - unique
      - name: date_key
        description: "Integer surrogate key in yyyyMMdd format."
        data_tests:
          - not_null
          - unique
      - name: year
        description: "The year extracted from the date."
        data_tests:
          - not_null
      - name: month
        description: "The month number extracted from the date."
        data_tests:
          - not_null
      - name: day
        description: "The day of the month extracted from the date."
        data_tests:
          - not_null
      - name: month_name
        description: "Abbreviated month name (e.g. Jan, Feb)."
        data_tests:
          - not_null
      - name: day_name
        description: "Abbreviated day name (e.g. Mon, Tue)."
        data_tests:
          - not_null
      - name: day_of_week
        description: "The day of the week as a number (1=Sunday in Databricks)."
        data_tests:
          - not_null
      - name: week_of_year
        description: "The ISO week number within the year."
        data_tests:
          - not_null
      - name: is_weekend
        description: "Boolean flag indicating whether the date falls on a weekend."
        data_tests:
          - not_null
      - name: month_start
        description: "The first day of the month for this date."
        data_tests:
          - not_null
      - name: month_end
        description: "The last day of the month for this date."
        data_tests:
          - not_null

  - name: dim_movies
    description: "Dimension table containing movies with their TMDB identifier, title, and release year."
    columns:
      - name: tmdb_id
        description: "The unique TMDB identifier for the movie."
        data_tests:
          - not_null
          - unique
      - name: title
        description: "The title of the movie."
        data_tests:
          - not_null
      - name: year
        description: "The release year of the movie."
        data_tests:
          - not_null

  - name: dim_sessions
    description: "Dimension table containing distinct user session identifiers derived from searches."
    columns:
      - name: session_id
        description: "The unique identifier for the user session."
        data_tests:
          - not_null
          - unique

  - name: fact_dialogues
    description: "Fact table containing dialogue script blocks enriched with character and actor references."
    columns:
      - name: id
        description: "Surrogate key generated from movie TMDB ID and index in script."
        data_tests:
          - not_null
          - unique
      - name: index_in_script
        description: "The position of this dialogue block within the movie script."
        data_tests:
          - not_null
      - name: dialogue_length
        description: "The character length of the dialogue text."
        data_tests:
          - not_null
      - name: has_suffix
        description: "Boolean flag indicating whether the dialogue has a suffix."
        data_tests:
          - not_null
      - name: has_parentheticals
        description: "Boolean flag indicating whether the dialogue has parentheticals."
        data_tests:
          - not_null
      - name: movie_tmdb_id
        description: "Foreign key referencing dim_movies."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_movies')
                field: tmdb_id
      - name: character_id
        description: "Foreign key referencing dim_characters, generated from character name, actor TMDB ID, and movie TMDB ID."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_characters')
                field: id
      - name: actor_tmdb_id
        description: "Foreign key referencing dim_actors."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_actors')
                field: tmdb_id

  - name: fact_searches
    description: "Fact table containing search events performed in the web application."
    columns:
      - name: search_id
        description: "The unique identifier for the search query."
        data_tests:
          - not_null
          - unique
      - name: query_text
        description: "The search query string."
        data_tests:
          - not_null
      - name: type_filters
        description: "The script block type filters applied to the search. Null indicates no filters were applied."
      - name: result_count
        description: "The number of search results returned."
        data_tests:
          - not_null
      - name: created_at
        description: "The timestamp when the search record was created."
        data_tests:
          - not_null
      - name: searched_at_date_key
        description: "Integer date key in yyyyMMdd format for the searched_at timestamp, referencing dim_dates."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: session_id
        description: "Foreign key referencing dim_sessions."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sessions')
                field: session_id
      - name: created_at_date_key
        description: "Integer date key in yyyyMMdd format for the created_at timestamp, referencing dim_dates."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
