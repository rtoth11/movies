resources:
  jobs:
    movies_asset_bundle_job:
      name: movies_asset_bundle_job

      schedule:
        quartz_cron_expression: "0 0 11 * * ?"
        timezone_id: "UTC"

      tasks:
        - task_key: json_to_table_task
          environment_key: default
          spark_python_task:
            python_file: "../src/json_to_table.py"
            parameters:
              - --movie-data-volume-path
              - ${var.movie_data_volume_path}
              - --bronze-schema-name
              - ${var.bronze_schema_name}
              - --asset-bundle-target
              - ${bundle.target}

        - task_key: dbt
          depends_on:
            - task_key: json_to_table_task
          environment_key: default
          dbt_task:
            project_directory: ../dbt
            profiles_directory: dbt_profiles/
            commands:
              - "dbt deps --target=${bundle.target}"
              - "dbt run --target=${bundle.target} --vars \"{ catalog_name: '${var.catalog_name}', schema_name: '${var.schema_name}', bronze_schema_name: '${var.bronze_schema_name}' }\""

        - task_key: databricks_to_postgres_task
          depends_on:
            - task_key: dbt
          environment_key: default
          spark_python_task:
            python_file: "../src/databricks_to_postgres.py"
            parameters:
              - --source-catalog
              - ${var.catalog_name}
              - --source-schema
              - ${var.schema_name}
              - --secret-scope
              - ${var.secret_scope}
              - --s3-bucket-name
              - ${var.s3_bucket_name}
              - --lambda-name
              - ${var.lambda_name}
              - --aws-region
              - ${var.aws_region}

        - task_key: run_pg_export_task
          depends_on:
            - task_key: databricks_to_postgres_task
          environment_key: default
          spark_python_task:
            python_file: "../src/run_pg_export.py"
            parameters:
              - --s3-bucket-name
              - ${var.s3_bucket_name}
              - --pg-export-s3-path
              - ${var.pg_export_s3_path}
              - --schema
              - ${var.schema_name}
              - --lambda-name
              - ${var.pg_export_lambda_function_name}
              - --aws-region
              - ${var.aws_region}
              - --secret-scope
              - ${var.secret_scope}

        - task_key: import_from_s3_task
          depends_on:
            - task_key: run_pg_export_task
          environment_key: default
          spark_python_task:
            python_file: "../src/import_from_s3.py"
            parameters:
              - --s3-bucket-name
              - ${var.s3_bucket_name}
              - --pg-export-s3-path
              - ${var.pg_export_s3_path}
              - --catalog
              - ${var.catalog_name}
              - --bronze-schema-name
              - ${var.bronze_schema_name}
              - --asset-bundle-target
              - ${bundle.target}
              - --secret-scope
              - ${var.secret_scope}

      environments:
        - environment_key: default

          spec:
            client: "2"
            dependencies:
              - ../dist/*.whl
              - -r ../requirements-dev.txt
